<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>set</h1>
    <button id="start">start</button>
    <button id="stop">stop</button>
</body>
<script>
   const sayDate= function(str){
    console.log(str, Date.now());// prints ayush in console after every 2 sec 
}

let intervalID;

document.querySelector('#start').addEventListener('click', function(){
    intervalID= setInterval(sayDate,2000,"Hi Ayush !!")
    console.log("Started the Repetition on start button click!!");
    
})
document.querySelector('#stop').addEventListener('click', function(){
    clearInterval(intervalID);
    console.log("Stopped the Repetition on stop button click!!");
})  

</script>
</html>
