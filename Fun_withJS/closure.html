    <Button id="green"> Green</Button>

function Outer(){
    let user = "Ayush"
    function inner(){
       console.log("Its inner func, here acces given of user", user);     
    }
    inner()// all the properties of outer func i accessible in the inner func

}
Outer()
console.log(user,"Too outer to get access");

// CLOSURE

function makeFunc(){
    const name= "Ayush";
    function display(){
        console.log(name);   
    }
    return display;
}

const myFunc = makeFunc();// here not only the display func goes (bcz it is returned) the other prop of outer also gets shared (complete lexical scope goes)
myFunc();
</script>
<script>
    // document.getElementById("orange").onclick = function(){
    //     document.body.style.backgroundColor = `orange`
    // }
    // document.getElementById("green").onclick = function(){
    //     document.body.style.backgroundColor = `green`
    // }
    // Now if we need 500 color buttons to be made similarly then ??

    function clickHandler(color){
        // document.body.style.backgroundColor = `${color}`
        return function (){
            document.body.style.backgroundColor = `${color}`
        }
    }
    document.getElementById("orange").onclick = clickHandler("orange")
    document.getElementById("green").onclick = clickHandler("green")

    //Thru lexical scoping when we call function the color also comes in the lexical scope of the func 
</script>
