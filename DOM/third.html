<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM-PART3</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <!-- <h1>DOM PART 3</h1> -->
</body>
<script>
    const div =document.createElement('div')
    console.log(div);//<div></div>
    div.className="main"
    div.id=Math.round(Math.random()*10+1)
    div.setAttribute("title","generated title")
    div.style.backgroundColor='yellow'
    div.style.padding="12px"
    div.style.borderRadius="10px"
    // but these all things wont be seen on the page since the div is not created inside the body and has just occupied the memory 
    div.innerText="Ayush dubey "// this brings the value and then set the value we give to them which makes an extra step to perform 
    const addText=document.createTextNode("Ayush dubey")
    div.appendChild(addText);// even this involves two step
    document.body.appendChild(div) 
    div.style.color="red"
//Now if the element(here it is the div) is generated 
// we can wrap it in a function and create a new div and then in argument we can pass what text or backgrnd color to be given  or even put loop on it 
</script>
</html>
