<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color:#212121; color:aliceblue;">
    <!--API is Talking lang b/w two systems (could be frontend backend, two backends or any two distinct systems)-->
    <!--Earlier we didnt have Api fetch we had the (xml http request)-->
    Value	State	Description
0	UNSENT	Client has been created. open() not called yet.

1	OPENED	open() has been called.

2	HEADERS_RECEIVED	send() has been called, and headers and status are available.

3	LOADING	Downloading; responseText holds partial data.

4	DONE	The operation is complete.
</body>
<script>
    const reqUrl= 'https://api.github.com/users/Ayushgit1621'

   const xhr = new XMLHttpRequest();
   // Ajax request , here new object is created')
   xhr.open('GET',reqUrl)
   xhr.onreadystatechange = function(){
    console.log(xhr.readyState);
    if(xhr.readyState ===4){
        const data = JSON.parse(this.responseText);
        console.log(typeof data);
        console.log(data.followers);

    }
   }// subscriber model like "onreadystate" continuously monitor things (will see in firebase and places)
  
   xhr.send(); // now the open()has been called

</script>
</html>
